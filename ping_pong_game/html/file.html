<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Simple Pong - Play vs Computer</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0b1220;
      color: #fff;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
    canvas {
      background: linear-gradient(#06203b, #02111a);
      box-shadow: 0 6px 18px rgba(0,0,0,0.7);
      border-radius: 8px;
    }
    #ui {
      position: absolute;
      top: 18px;
      text-align: center;
      width: 100%;
      pointer-events: none;
      font-size: 14px;
    }
    #instructions {
      pointer-events: auto;
      background: rgba(255,255,255,0.04);
      display: inline-block;
      padding: 8px 12px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="ui">
    <div id="instructions">Use Up / Down arrows (or W / S) to move. First to 5 wins. Press Space to restart after a win.</div>
  </div>
  <canvas id="game" width="900" height="500"></canvas>

  <script>
    // Simple Pong game (single HTML file)
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // Game settings
    const WIN_SCORE = 5;
    const PADDLE_WIDTH = 14;
    const PADDLE_HEIGHT = 90;
    const PADDLE_SPEED = 6;         // player's paddle speed (pixels per frame)
    const COMP_SPEED = 4.0;         // computer paddle max speed
    const BALL_RADIUS = 8;
    const FPS_SMOOTH = true;

    // State
    let playerScore = 0;
    let compScore = 0;
    let running = true;
    let gameOver = false;

    // Player paddle (left)
    const player = {
      x: 20,
      y: (canvas.height - PADDLE_HEIGHT) / 2,
      width: PADDLE_WIDTH,
      height: PADDLE_HEIGHT,
      dy: 0
    };

    // Computer paddle (right)
    const comp = {
      x: canvas.width - 20 - PADDLE_WIDTH,
      y: (canvas.height - PADDLE_HEIGHT) / 2,
      width: PADDLE_WIDTH,
      height: PADDLE_HEIGHT
    };

    // Ball
    const ball = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      vx: 0,
      vy: 0,
      speed: 5
    };

    // Keyboard
    const keys = {
      ArrowUp: false,
      ArrowDown: false,
      KeyW: false,
      KeyS: false
    };

    // Initialize ball with random direction toward last scorer or random
    function resetBall(toPlayer = null) {
      ball.x = canvas.width / 2;
      ball.y = canvas.height / 2;
      ball.speed = 5;

      // pick side: if toPlayer===true -> ball goes to player (left), false -> to comp (right)
      let angle = (Math.random() * Math.PI/3) - (Math.PI/6); // -30 to +30 degrees
      let dir;
      if (toPlayer === true) dir = -1;
      else if (toPlayer === false) dir = 1;
      else dir = Math.random() < 0.5 ? -1 : 1;

      ball.vx = dir * ball.speed * Math.cos(angle);
      ball.vy = ball.speed * Math.sin(angle);
    }

    // Simple collision detection between ball and paddle
    function collideBallPaddle(b, p) {
      return b.x - BALL_RADIUS < p.x + p.width &&
             b.x + BALL_RADIUS > p.x &&
             b.y - BALL_RADIUS < p.y + p.height &&
             b.y + BALL_RADIUS > p.y;
    }

    // Draw functions
    function drawNet() {
      const netWidth = 4;
      const seg = 16;
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      for (let y = 10; y < canvas.height; y += seg + 8) {
        ctx.fillRect(canvas.width / 2 - netWidth/2, y, netWidth, seg);
      }
    }

    function draw() {
      // Clear
      ctx.clearRect(0,0,canvas.width,canvas.height);

      // Background subtle gradient already set by CSS; we still clear for clean draws
      // Draw net
      drawNet();

      // Scores
      ctx.fillStyle = '#e6f0ff';
      ctx.font = '48px system-ui, Arial';
      ctx.textAlign = 'center';
      ctx.fillText(playerScore, canvas.width * 0.25, 60);
      ctx.fillText(compScore, canvas.width * 0.75, 60);

      // Paddles
      ctx.fillStyle = '#cfe9ff';
      roundRect(ctx, player.x, player.y, player.width, player.height, 6);
      roundRect(ctx, comp.x, comp.y, comp.width, comp.height, 6);

      // Ball
      ctx.beginPath();
      ctx.fillStyle = '#fff';
      ctx.arc(ball.x, ball.y, BALL_RADIUS, 0, Math.PI*2);
      ctx.fill();

      // If game over show message
      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(canvas.width/2 - 260, canvas.height/2 - 60, 520, 120);
        ctx.fillStyle = '#fff';
        ctx.font = '28px system-ui, Arial';
        ctx.textAlign = 'center';
        const winner = playerScore > compScore ? 'You win!' : 'Computer wins';
        ctx.fillText(winner, canvas.width/2, canvas.height/2 - 6);
        ctx.font = '16px system-ui, Arial';
        ctx.fillText('Press Space to restart', canvas.width/2, canvas.height/2 + 28);
      }
    }

    // Utility: rounded rect
    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
      ctx.fill();
    }

    // Update game state
    function update() {
      if (!running) return;

      // Move player paddle based on keys
      let move = 0;
      if (keys.ArrowUp || keys.KeyW) move -= 1;
      if (keys.ArrowDown || keys.KeyS) move += 1;
      player.y += move * PADDLE_SPEED;
      // Clamp
      if (player.y < 0) player.y = 0;
      if (player.y + player.height > canvas.height) player.y = canvas.height - player.height;

      // Simple computer AI: move toward ball.y with limited speed
      const targetY = ball.y - comp.height / 2;
      const dy = targetY - comp.y;
      if (Math.abs(dy) > 4) {
        comp.y += Math.sign(dy) * Math.min(COMP_SPEED, Math.abs(dy));
      } else {
        comp.y = targetY;
      }
      // Clamp
      if (comp.y < 0) comp.y = 0;
      if (comp.y + comp.height > canvas.height) comp.y = canvas.height - comp.height;

      // Move ball
      ball.x += ball.vx;
      ball.y += ball.vy;

      // Top/bottom walls
      if (ball.y - BALL_RADIUS < 0) {
        ball.y = BALL_RADIUS;
        ball.vy = -ball.vy;
      } else if (ball.y + BALL_RADIUS > canvas.height) {
        ball.y = canvas.height - BALL_RADIUS;
        ball.vy = -ball.vy;
      }

      // Paddles collision
      if (collideBallPaddle(ball, player)) {
        // Move ball out of paddle to avoid sticking
        ball.x = player.x + player.width + BALL_RADIUS;
        // reflect and vary angle based on where on the paddle it hits
        const relativeY = (ball.y - (player.y + player.height/2));
        const norm = relativeY / (player.height/2);
        const maxBounce = Math.PI / 3; // 60 degrees
        const angle = norm * maxBounce;
        const speedIncrease = 0.5;
        ball.speed += speedIncrease;
        ball.vx = Math.cos(angle) * ball.speed;
        ball.vy = Math.sin(angle) * ball.speed;
      } else if (collideBallPaddle(ball, comp)) {
        ball.x = comp.x - BALL_RADIUS;
        const relativeY = (ball.y - (comp.y + comp.height/2));
        const norm = relativeY / (comp.height/2);
        const maxBounce = Math.PI / 3;
        const angle = norm * maxBounce;
        const speedIncrease = 0.5;
        ball.speed += speedIncrease;
        // ball going left now
        ball.vx = -Math.cos(angle) * ball.speed;
        ball.vy = Math.sin(angle) * ball.speed;
      }

      // Left and right out-of-bounds: scoring
      if (ball.x - BALL_RADIUS < 0) {
        // computer scores
        compScore++;
        if (compScore >= WIN_SCORE) {
          gameOver = true;
          running = false;
        }
        resetBall(false); // send ball toward player next
      } else if (ball.x + BALL_RADIUS > canvas.width) {
        // player scores
        playerScore++;
        if (playerScore >= WIN_SCORE) {
          gameOver = true;
          running = false;
        }
        resetBall(true); // send ball toward comp next
      }
    }

    // Game loop
    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    // Controls
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        if (gameOver) {
          playerScore = 0;
          compScore = 0;
          gameOver = false;
          running = true;
          resetBall();
        }
        e.preventDefault();
        return;
      }
      if (e.code in keys) {
        keys[e.code] = true;
      }
    });

    window.addEventListener('keyup', (e) => {
      if (e.code in keys) {
        keys[e.code] = false;
      }
    });

    // Start
    resetBall(); // initial serve
    loop();
  </script>
</body>
</html>
