<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Birthday Card Roast & Toast</title>
    <style>
        :root {
            --primary-color: #ff477e;
            --secondary-color: #ff85a2;
            --accent-color: #fec7d7;
            --bg-color: #fff0f3;
            --text-color: #0d1b2a;
            --card-inside: #fffaf0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            animation: bounce 2s infinite alternate;
        }

        h1 {
            font-size: 3rem;
            color: var(--primary-color);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            margin: 0;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: #6c757d;
            margin-top: 5px;
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 40px;
            align-items: flex-start;
        }

        /* Left Side: Generator Form */
        .form-side {
            flex: 1;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 71, 126, 0.15);
            position: sticky;
            top: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--primary-color);
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--accent-color);
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 15px rgba(255, 71, 126, 0.3);
        }

        button:hover {
            background-color: #e03a6c;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Right Side: Cards Stack */
        .cards-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
            max-height: 80vh;
            overflow-y: auto;
            padding-right: 10px;
        }

        /* Inside of a Birthday Card Styling */
        .birthday-card {
            background-color: var(--card-inside);
            border: 2px dashed var(--secondary-color);
            border-radius: 15px;
            padding: 40px;
            min-height: 200px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.05), 5px 5px 15px rgba(0,0,0,0.1);
            position: relative;
            font-family: 'Georgia', serif;
            line-height: 1.6;
            animation: fadeIn 0.5s ease-out;
        }

        /* Subtle crease effect to mimic the inside fold of a card */
        .birthday-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 15px;
            background: linear-gradient(to right, rgba(0,0,0,0.05), transparent);
            border-top-left-radius: 15px;
            border-bottom-left-radius: 15px;
        }

        .card-salutation {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .card-body {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 25px;
            font-style: italic;
        }

        .card-closing {
            font-size: 1.1rem;
            font-weight: bold;
            text-align: right;
            color: var(--secondary-color);
        }

        .placeholder-text {
            color: #a8a29e;
            text-align: center;
            font-style: italic;
            margin-top: 50px;
            font-size: 1.2rem;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }
            .form-side {
                position: static;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>🎉 The Ultimate Card Crafter 🎂</h1>
        <p class="subtitle">Because store-bought sentiments are overrated.</p>
    </header>

    <div class="container">
        <!-- Left Side: Input Panel -->
        <div class="form-side">
            <div class="form-group">
                <label for="name">Birthday Person's Name</label>
                <input type="text" id="name" placeholder="e.g., Dave" required>
            </div>
            
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" placeholder="e.g., 30" required>
            </div>
            
            <div class="form-group">
                <label for="hobby">Primary Hobby/Interest</label>
                <input type="text" id="hobby" placeholder="e.g., gardening, video games, baking" required>
            </div>

            <button onclick="generateCard()">Generate Card Lineup! 🚀</button>
        </div>

        <!-- Right Side: Output Display Stack -->
        <div class="cards-side" id="cardsContainer">
            <div class="placeholder-text" id="placeholder">
                Your custom creations will stack right here... Fill out the details to begin!
            </div>
        </div>
    </div>

    <script>
        // Array of funny punchlines mixing age and hobbies
        const jokes = [
            "Happy Birthday! Statistics show that people who have more birthdays live longer. Scientists also say that at your age, pursuing [HOBBY] counts as a rigorous medical stress test. Keep surviving!",
            "Cheers to [AGE] years! They say wisdom comes with age... but in your case, it looks like it just brought an intense obsession with [HOBBY]. May your recovery times be swift and your joint pain minimal today!",
            "Happy Birthday, [NAME]! You’ve officially reached the age where 'getting lucky' means finding a parking spot close to the store. Best of luck spending the rest of your youth and savings on [HOBBY]!",
            "Congratulations on turning [AGE]! You don't look a day over a hundred. Just remember: you're never too old to enjoy [HOBBY]... though you might need to stretch for 20 minutes before and after doing it now.",
            "Happy Birthday! You've reached a glorious milestone. At [AGE], you can finally use your age as an excuse to cancel social plans so you can stay home and do more [HOBBY]. Live the dream!",
            "Happy [AGE]th Birthday! I wanted to make a joke about your age, but I respect my elders. Instead, I'll just hope your birthday is filled with endless hours of [HOBBY] and absolutely zero lower back pain."
        ];

        function generateCard() {
            const name = document.getElementById('name').value.trim();
            const age = document.getElementById('age').value.trim();
            const hobby = document.getElementById('hobby').value.trim();

            // Simple validation check
            if (!name || !age || !hobby) {
                alert("Please fill out all the fields to weave the magic!");
                return;
            }

            // Remove placeholder text on first card generation
            const placeholder = document.getElementById('placeholder');
            if (placeholder) {
                placeholder.remove();
            }

            // Select a random joke template and inject custom variables
            const randomTemplate = jokes[Math.floor(Math.random() * jokes.length)];
            const personalizedMessage = randomTemplate
                .replace(/\[NAME\]/g, name)
                .replace(/\[AGE\]/g, age)
                .replace(/\[HOBBY\]/g, hobby);

            // Create new card elements mimicking the inside of a greeting card
            const newCard = document.createElement('div');
            newCard.className = 'birthday-card';

            newCard.innerHTML = `
                <div class="card-salutation">Dear ${name},</div>
                <div class="card-body">"${personalizedMessage}"</div>
                <div class="card-closing">Best wishes,<br>The Generator 🎈</div>
            `;

            // Insert new card at the very top of the stack
            const container = document.getElementById('cardsContainer');
            container.insertBefore(newCard, container.firstChild);

            // Clear inputs for the next entry
            document.getElementById('name').value = '';
            document.getElementById('age').value = '';
            document.getElementById('hobby').value = '';
        }
    </script>
</body>
</html>
