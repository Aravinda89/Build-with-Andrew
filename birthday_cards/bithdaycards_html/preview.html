<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Card Creator</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: "Trebuchet MS", sans-serif;
    }

    body {
        background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
        min-height: 100vh;
        padding: 30px;
    }

    h1 {
        text-align: center;
        color: white;
        font-size: 3rem;
        margin-bottom: 30px;
        text-shadow: 2px 2px 6px rgba(0,0,0,0.25);
    }

    .container {
        display: flex;
        gap: 30px;
        align-items: flex-start;
    }

    .form-panel {
        flex: 1;
        background: white;
        padding: 25px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    .form-panel h2 {
        margin-bottom: 20px;
        color: #ff4d6d;
    }

    label {
        display: block;
        margin-top: 15px;
        margin-bottom: 6px;
        font-weight: bold;
        color: #444;
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 2px solid #ffd6df;
        font-size: 1rem;
    }

    button {
        margin-top: 20px;
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 12px;
        background: #ff4d6d;
        color: white;
        font-size: 1.1rem;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #e63956;
        transform: translateY(-2px);
    }

    .cards-panel {
        flex: 1.3;
    }

    .card {
        background: #fffef7;
        border-left: 12px solid #ffb703;
        padding: 25px;
        margin-bottom: 20px;
        border-radius: 15px;
        box-shadow: 0 8px 18px rgba(0,0,0,0.12);
        position: relative;
    }

    .card::before {
        content: "🎂";
        position: absolute;
        top: 15px;
        right: 20px;
        font-size: 2rem;
    }

    .card-title {
        text-align: center;
        color: #ff4d6d;
        font-size: 1.8rem;
        margin-bottom: 15px;
        border-bottom: 2px dashed #ffc8dd;
        padding-bottom: 10px;
    }

    .card-message {
        font-size: 1.15rem;
        line-height: 1.7;
        color: #444;
        text-align: center;
    }

    @media (max-width: 900px) {
        .container {
            flex-direction: column;
        }
    }
</style>
</head>
<body>

<h1>🎉 The Ultimate Birthday Card Laugh Factory 🎉</h1>

<div class="container">

    <div class="form-panel">
        <h2>Create a Birthday Card</h2>

        <label>Name</label>
        <input type="text" id="name" placeholder="Enter name">

        <label>Age</label>
        <input type="number" id="age" placeholder="Enter age">

        <label>Favorite Hobby</label>
        <input type="text" id="hobby" placeholder="Enter hobby">

        <button onclick="createCard()">Generate Funny Birthday Card</button>
    </div>

    <div class="cards-panel" id="cardsPanel">
    </div>

</div>

<script>
function createCard() {

    const name = document.getElementById("name").value.trim();
    const age = document.getElementById("age").value.trim();
    const hobby = document.getElementById("hobby").value.trim();

    if (!name || !age || !hobby) {
        alert("Please fill out all fields!");
        return;
    }

    const jokes = [
        `${name}, congratulations on turning ${age}! At this point, candles cost more than the cake.`,
        `${age} years old? That's not old. You're just a classic collector's edition.`,
        `Rumor has it your ${hobby} skills improve every year. Scientists remain skeptical.`,
        `You don't look ${age} at all... from very far away.`,
        `The older you get, the better you get... unless you're a banana.`
    ];

    const randomJoke = jokes[Math.floor(Math.random() * jokes.length)];

    const message = `
        Dear ${name},

        Happy ${age}th Birthday! 🎉

        We hope your special day is packed with cake, laughter, gifts,
        and plenty of time for ${hobby}.

        ${randomJoke}

        Have an amazing birthday and remember:
        age is merely the number of years the world has enjoyed having you around!

        🎈 Happy Birthday! 🎈
    `;

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <div class="card-title">To ${name}</div>
        <div class="card-message">${message.replace(/\n/g,"<br>")}</div>
    `;

    // Add newest card at the top while keeping old ones visible
    const panel = document.getElementById("cardsPanel");
    panel.prepend(card);

    document.getElementById("name").value = "";
    document.getElementById("age").value = "";
    document.getElementById("hobby").value = "";
}
</script>

</body>
</html>
